             C362 224 392 240 408 274
             C352 268 316 286 288 318
             C312 326 328 344 336 372
             C298 348 268 348 256 360 Z"/>
    <!-- head + crest -->
    <path d="M256 96
             C238 110 232 132 240 156
             C246 174 256 184 256 184
             C256 184 266 174 272 156
             C280 132 274 110 256 96 Z"/>
    <!-- tail -->
    <path d="M256 350
